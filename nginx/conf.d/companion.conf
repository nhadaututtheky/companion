# Companion — Nginx reverse proxy config
# Domain: app.yourdomain.com → Companion web + API + WebSocket
#
# Usage:
#   1. Replace app.yourdomain.com with your actual domain
#   2. Place SSL certs in nginx/certs/ (or use Cloudflare Origin certs)
#   3. Uncomment the nginx service in docker-compose.yml
#   4. docker compose up -d

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name app.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.yourdomain.com;

    # SSL — option 1: Cloudflare Origin Certificate (free, 15-year)
    #   Dashboard → SSL/TLS → Origin Server → Create Certificate
    #   Download .pem (cert) and .key (private key) to nginx/certs/
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── WebSocket (session streams) ───────────────────────────
    location /ws/ {
        proxy_pass http://companion:3579/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # keep WS alive 24h
        proxy_send_timeout 86400s;
    }

    # ── Everything else → Hono (:3579) — API + static web UI ─
    location / {
        proxy_pass http://companion:3579;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Max upload size (for file operations)
    client_max_body_size 50M;
}

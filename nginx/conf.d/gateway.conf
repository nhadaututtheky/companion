# Companion Gateway — internal reverse proxy for Cloudflare Tunnel
# Routes requests to the correct internal service (web UI vs API/WS)
# No SSL needed — Cloudflare Tunnel handles encryption end-to-end

server {
    listen 80;
    server_name _;

    # ── API routes → Hono server (:3579) ──────────────────────
    location /api/ {
        proxy_pass http://companion:3579/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── WebSocket → Hono server (:3579) ───────────────────────
    location /ws/ {
        proxy_pass http://companion:3579/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Everything else → Next.js web UI (:3580) ──────────────
    location / {
        proxy_pass http://companion:3580;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    client_max_body_size 50M;
}

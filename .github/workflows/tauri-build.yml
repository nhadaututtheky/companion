name: Tauri Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_pattern: "src-tauri/target/release/bundle/**/*.{msi,exe}"
            artifact_name: "companion-windows"

          - platform: macos-latest
            artifact_pattern: "src-tauri/target/release/bundle/**/*.dmg"
            artifact_name: "companion-macos"

          - platform: ubuntu-22.04
            artifact_pattern: "src-tauri/target/release/bundle/**/*.{AppImage,deb}"
            artifact_name: "companion-linux"

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node + Bun ──────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # ── Linux system dependencies ────────────────────────────────────────────
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── Rust ─────────────────────────────────────────────────────────────────
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Build Bun sidecar ────────────────────────────────────────────────────
      - name: Build Bun server sidecar
        shell: bash
        run: |
          TARGET_TRIPLE=$(rustc -Vv | grep '^host:' | awk '{print $2}')
          echo "Target triple: $TARGET_TRIPLE"
          OUTFILE="src-tauri/bun-server-${TARGET_TRIPLE}"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            OUTFILE="${OUTFILE}.exe"
          fi
          bun build packages/server/src/index.ts \
            --compile \
            --target bun \
            --outfile "$OUTFILE"
          ls -lh src-tauri/bun-server-*

      # ── Build Tauri ──────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Linux: linuxdeploy needs this on GitHub runners (no FUSE)
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
          # NOTE: macOS/Windows code signing requires secrets to be configured in repo settings.
          # Without signing secrets, builds will be unsigned (OK for testing).
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseName: "Companion ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          releaseBody: |
            ## Companion Desktop Release

            Multi-session Claude Code Manager — desktop app powered by Tauri 2.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` (recommended) or `.exe` (NSIS) |
            | macOS    | `.dmg` |
            | Linux    | `.AppImage` or `.deb` |

            ### Changelog
            See [CHANGELOG](https://github.com/theio-vn/companion/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          tauriScript: cargo tauri
          args: ""

      # ── Upload version-less aliases for direct download links ──────────────
      - name: Upload version-less download aliases
        if: github.ref_type == 'tag' || inputs.tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          # macOS
          DMG=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "Companion_aarch64.dmg"
            gh release upload "$TAG" "Companion_aarch64.dmg" --clobber
          fi

          # Windows
          MSI=$(find "$BUNDLE_DIR" -name "*.msi" | head -1)
          if [ -n "$MSI" ]; then
            cp "$MSI" "Companion_x64-setup.msi"
            gh release upload "$TAG" "Companion_x64-setup.msi" --clobber
          fi

          # Linux
          APPIMAGE=$(find "$BUNDLE_DIR" -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "Companion_amd64.AppImage"
            gh release upload "$TAG" "Companion_amd64.AppImage" --clobber
          fi

      # ── Upload artifacts (for non-release workflow_dispatch) ─────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          retention-days: 7
          if-no-files-found: warn

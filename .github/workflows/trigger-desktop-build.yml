name: Trigger Desktop Build

on:
  push:
    tags: ['v*']

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Tauri build in companion-release
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Triggering desktop build for tag: $TAG"
          gh workflow run tauri-build.yml \
            --repo nhadaututtheky/companion-release \
            --field tag="$TAG"

name: CI Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check (shared)
        run: cd packages/shared && bun run check

      - name: Type check (server)
        run: cd packages/server && bun run check

      - name: Type check (web)
        run: cd packages/web && bun run check

      - name: Test (server)
        run: |
          cd packages/server
          failed=0
          for f in src/services/*.test.ts src/tests/*.test.ts; do
            echo "::group::$f"
            if ! bun test "$f"; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Test (web)
        run: cd packages/web && bun test

      - name: Build (web)
        run: cd packages/web && bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3579

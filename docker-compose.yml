version: "3.8"

services:
  companion:
    build: .
    container_name: companion
    restart: unless-stopped
    ports:
      - "3579:3579"  # Server API + WebSocket
      - "3580:3580"  # Web UI
    volumes:
      # SQLite database persistence
      - companion-data:/app/data

      # Claude CLI auth — maps your local credentials into container
      - ${USERPROFILE:-${HOME}}/.claude:/root/.claude

      # Host filesystem — mount drives to /mnt/<letter> (auto-detected by browser)
      # Windows: add your drives here (rw so Claude CLI can write code)
      - C:/:/mnt/c
      - D:/:/mnt/d
      # - E:/:/mnt/e    # uncomment if E: drive exists
      # macOS/Linux: mount home or root
      # - /:/mnt/host

    environment:
      - NODE_ENV=production
      - PORT=3579

      # Auth for Companion web UI (set a password)
      - API_KEY=${COMPANION_API_KEY:-}

      # License key (get from companion.theio.vn)
      - COMPANION_LICENSE_KEY=${COMPANION_LICENSE_KEY:-}

      # NOT needed for subscription — Claude CLI uses ~/.claude/.credentials.json
      # Only set if using API key auth instead:
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Project browser — which dirs users can browse
      # Optional: restrict browsing to specific dirs (omit to auto-detect /mnt drives)
      # - ALLOWED_BROWSE_ROOTS=/mnt/d/Project

      # Optional: Telegram bot
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS:-}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3579/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  companion-data:

services:
  companion:
    build: .
    container_name: companion
    restart: unless-stopped
    ports:
      - "3579:3579"  # Server API + WebSocket + Web UI (static)
    volumes:
      # SQLite database persistence
      - companion-data:/app/data

      # Claude CLI auth — maps your local credentials into container
      - ${USERPROFILE:-${HOME}}/.claude:/home/companion/.claude

      # Host filesystem — mount project dirs so Claude CLI can read/write code
      # Uncomment and adjust for your platform:
      #
      # Windows:
      #   - C:/:/mnt/c
      #   - D:/:/mnt/d
      #
      # macOS/Linux:
      #   - ${HOME}:/mnt/home
      #   - /:/mnt/host    # full filesystem (use with caution)

    environment:
      - NODE_ENV=production
      - PORT=3579

      # Auth for Companion web UI (set a password)
      - API_KEY=${COMPANION_API_KEY:-}

      # License key (get from companion.theio.vn)
      - COMPANION_LICENSE_KEY=${COMPANION_LICENSE_KEY:-}

      # NOT needed for subscription — Claude CLI uses ~/.claude/.credentials.json
      # Only set if using API key auth instead:
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Project browser — which dirs users can browse
      # Optional: restrict browsing to specific dirs (omit to auto-detect /mnt drives)
      # - ALLOWED_BROWSE_ROOTS=/mnt/d/Project

      # Optional: Telegram bot
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS:-}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3579/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # CUSTOM DOMAIN — pick ONE option, uncomment the service block
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # ── Option A: Cloudflare Tunnel (recommended) ───────────────────────────
  # Zero port expose, auto SSL, works behind NAT/firewall.
  #
  # Setup (5 min):
  #   1. Cloudflare Dashboard → Zero Trust → Networks → Tunnels → Create
  #   2. Name: "companion", copy the token (eyJ...)
  #   3. Add public hostname:
  #      - Domain: app.yourdomain.com
  #      - Service: http://companion-gateway:80
  #   4. Set CLOUDFLARE_TUNNEL_TOKEN in .env
  #   5. Uncomment both gateway + cloudflared below
  #   6. docker compose up -d
  #
  # gateway:
  #   image: nginx:alpine
  #   container_name: companion-gateway
  #   restart: unless-stopped
  #   volumes:
  #     - ./nginx/conf.d/gateway.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - companion
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: cloudflared
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - gateway

  # ── Option B: Nginx + SSL (self-hosted, public IP) ─────────────────────
  # Use if you have a public server with ports 80/443 open.
  # Edit nginx/conf.d/companion.conf — replace domain, add SSL certs.
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: companion-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - companion

volumes:
  companion-data:
